- name: Set default deny incoming
  community.general.ufw:
    state: enabled
    default: deny
    direction: incoming

- name: Allow SSH
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Allow application port from localhost
  community.general.ufw:
    rule: allow
    port: "{{ service_port }}"
    proto: tcp
    src: 127.0.0.1