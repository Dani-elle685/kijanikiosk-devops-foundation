---

- name: Configure KijaniKiosk servers
  hosts: kijanikiosk
  become: true
  become_method: sudo

  handlers:

  - name: Reload systemd
    ansible.builtin.systemd:
      daemon_reload: true

  - name: Restart service
    ansible.builtin.systemd:
      name: "{{ service_name }}"
      state: restarted
      when: service_name is defined

  - name: Restart journald
    ansible.builtin.systemd:
      name: systemd-journald
      state: restarted

  - name: Enable service
    ansible.builtin.systemd:
      name: "{{ service_name }}.service"
      enabled: true
      state: started

  tasks:

  #################################################################

  # PHASE 1 - PACKAGES

  #################################################################

  - name: Update apt cache
    ansible.builtin.apt:
      update_cache: true
      cache_valid_time: 3600

  - name: Install required packages
    ansible.builtin.apt:
      name:
      - curl
      - git
      - jq
      - unzip
      - ufw
      - logrotate
      state: present
      install_recommends: false

  #################################################################

  # PHASE 2 - USERS AND GROUPS

  #################################################################

  - name: Create kijanikiosk system group
    ansible.builtin.group:
      name: "{{ service_group }}"
      system: true
      state: present

  - name: Create service account
    ansible.builtin.user:
      name: "{{ service_name }}"
      group: "{{ service_group }}"
      system: true
      shell: /usr/sbin/nologin
      create_home: false
      state: present

  #################################################################

  # PHASE 3 - DIRECTORIES

  #################################################################

  - name: Create application directory tree
    ansible.builtin.file:
      path: "{{ item.path }}"
      state: directory
      owner: "{{ item.owner }}"
      group: "{{ item.group }}"
      mode: "{{ item.mode }}"
    loop:
      - path: "{{ base_dir }}"
        owner: root
        group: root
        mode: "0755"

      - path: "{{ base_dir }}/{{ service_name }}"
        owner: "{{ service_name }}"
        group: "{{ service_group }}"
        mode: "0755"

      - path: "{{ log_dir }}"
        owner: "{{ service_name }}"
        group: "{{ service_group }}"
        mode: "0755"

  #################################################################

  # PHASE 4 - SYSTEMD SERVICE

  #################################################################

  - name: Deploy systemd service
    ansible.builtin.template:
      src: templates/service.unit.j2
      dest: "/etc/systemd/system/{{ service_name }}.service"
      owner: root
      group: root
      mode: "0644"
    notify:

      - Reload systemd
      - Restart service

  - name: Enable and start service
    ansible.builtin.systemd:
      name: "{{ service_name }}"
      enabled: true
      state: started
      daemon_reload: true

  #################################################################

  # PHASE 5 - FIREWALL

  #################################################################

  - name: Enable UFW with default deny incoming
    community.general.ufw:
      state: enabled
      direction: incoming
      default: deny

  - name: Allow SSH
    community.general.ufw:
      rule: allow
      port: "22"
      proto: tcp

  - name: Allow application port
    community.general.ufw:
      rule: allow
      port: "{{ service_port }}"
      proto: tcp
      src: 127.0.0.1

  #################################################################

  # PHASE 6 - JOURNAL PERSISTENCE

  #################################################################

  - name: Create persistent journal directory
    ansible.builtin.file:
      path: /var/log/journal
      state: directory
      owner: root
      group: systemd-journal
      mode: "2755"
    notify:

      - Restart journald

  #################################################################

  # PHASE 7 - LOGROTATE

  #################################################################

  - name: Deploy logrotate configuration
    ansible.builtin.template:
      src: templates/logrotate.j2
      dest: /etc/logrotate.d/kijanikiosk
      owner: root
      group: root
      mode: "0644"
